<html>

<head>
    <style>
        :root {
            --color-yellow: #fdd04e;
            --color-gray-950: #111111;
            --color-gray-500: #6b6b6b;
            --color-white: #ffffff;

            --font-family: 'Figtree', sans-serif;

            --text-preset-1-size: 24px;
            --text-preset-1-weight: 800;
            --text-preset-1-line-height: 1.5;
            --text-preset-1-letter-spacing: 0px;

            --text-preset-2-size: 16px;
            --text-preset-2-weight: 500;
            --text-preset-2-line-height: 1.5;
            --text-preset-2-letter-spacing: 0px;

            --text-preset-3-size: 14px;
            --text-preset-3-weight: 500;
            --text-preset-3-line-height: 1.5;
            --text-preset-3-letter-spacing: 0px;

            --text-preset-3-bold-size: 14px;
            --text-preset-3-bold-weight: 800;
            --text-preset-3-bold-line-height: 1.5;
            --text-preset-3-bold-letter-spacing: 0px;
        }

        @font-face {
            font-family: 'Figtree';
            src: url('./assets/fonts/Figtree-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }

        @font-face {
            font-family: 'Figtree';
            src: url('./assets/fonts/Figtree-ExtraBold.ttf') format('truetype');
            font-weight: 800;
            font-style: normal;
        }

        /* Text Preset Utility Classes */
        .text-preset-1 {
            font-size: var(--text-preset-1-size);
            font-weight: var(--text-preset-1-weight);
            line-height: var(--text-preset-1-line-height);
            letter-spacing: var(--text-preset-1-letter-spacing);
        }

        .text-preset-2 {
            font-size: var(--text-preset-2-size);
            font-weight: var(--text-preset-2-weight);
            line-height: var(--text-preset-2-line-height);
            letter-spacing: var(--text-preset-2-letter-spacing);
        }

        .text-preset-3 {
            font-size: var(--text-preset-3-size);
            font-weight: var(--text-preset-3-weight);
            line-height: var(--text-preset-3-line-height);
            letter-spacing: var(--text-preset-3-letter-spacing);
        }

        .text-preset-3-bold {
            font-size: var(--text-preset-3-bold-size);
            font-weight: var(--text-preset-3-bold-weight);
            line-height: var(--text-preset-3-bold-line-height);
            letter-spacing: var(--text-preset-3-bold-letter-spacing);
        }

        .author {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .author__avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #346712;
        }

        .badge {
            display: inline-block;
            color: var(--color-gray-950);
            background-color: var(--color-yellow);
            padding: 4px 12px;
            border-radius: 4px;
        }

        .card {
            padding: 24px;
            background-color: var(--color-white);
            border-radius: 20px;
            border: 1px;
            border-color: var(--color-gray-950);
            border-style: solid inset;
            box-shadow: 8px 8px 0px black;
            width: 320px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card__image {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .card__title {
            margin: 0;
            color: var(--color-gray-950);
        }

        .card__body {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
        }

        .card__date {
            color: var(--color-gray-950);
        }

        .card__description {
            margin: 0;
            color: var(--color-gray-500);
        }

        body {
            font-family: var(--font-family);
            background-color: var(--color-yellow);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card__body">
            <img class="card__image" src="public/illustration-article.svg" />
            <div class="badge text-preset-3-bold">Learning</div>
            <div class="card__date text-preset-3">Published 21 Dec 2023</div>
            <h2 class="card__title text-preset-1">HTML & CSS foundations</h2>
            <p class="card__description text-preset-2">
                These languages are the backbone of every website, defining structure, content, and
                presentation.
            </p>
        </div>
        <div class="author">
            <img class="author__avatar" src="public/image-avatar.webp" img />
            <span class="text-preset-3-bold">Greg Hooper</span>
        </div>
    </div>

</body>

</html>
