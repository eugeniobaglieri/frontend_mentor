<div class="filter-bar">
  <h1 class="filter-bar_title text-preset-1">Extensions List</h1>
  <div class="filter-btns">
    @for (f of filters; track $index) {
      <button class="filter-btn" [class.active]="f === selectedFilter" (click)="onFilterChange(f)">
        {{ f }}
      </button>
    }
  </div>
</div>
